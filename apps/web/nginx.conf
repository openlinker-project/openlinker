# OpenLinker Web — SPA config. `try_files … /index.html` keeps React Router's
# client-side routes (e.g. /connections) working on hard refresh / deep links.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Baseline security headers — a local demo, but cheap to set correctly.
    # NOTE: nginx does NOT inherit server-level `add_header`s into a location
    # that declares its own `add_header` — each location below re-states them.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Vite content-hashes its JS/CSS bundle filenames, so those are safe to
    # cache indefinitely; index.html itself must always revalidate or a
    # rebuilt bundle never reaches returning visitors.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }
}
