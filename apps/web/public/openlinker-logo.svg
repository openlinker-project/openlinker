<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OpenLinker">
  <title>OpenLinker</title>
  <!-- Brand: dark graphite canvas (oklch 14% 0.005 270) + signal-orange accent (oklch 72% 0.18 50) -->

  <!-- Dark graphite canvas -->
  <rect width="500" height="500" fill="#1a1d22"/>

  <!-- Diagonal chain-link capsule -->
  <g transform="translate(250 250) rotate(-30)">
    <rect x="-72" y="-160" width="144" height="320" rx="72" ry="72"
          fill="none" stroke="#ee8c3c" stroke-width="42"/>
  </g>

  <!-- Horizontal linker bar passing through the loop -->
  <rect x="105" y="232" width="290" height="36" rx="18" fill="#ee8c3c"/>
</svg>
