# Demo overlay — one-command full-stack demo (#1352).
#
# Used TOGETHER with the base file, never alone:
#
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d --build \
#     postgres redis mysql prestashop migrate api worker web
#
# (wrapped by `pnpm demo:up` / `demo:down` / `demo:logs`)
#
# The base docker-compose.yml stays the single source of truth for the infra
# services (postgres/redis/mysql/prestashop); this overlay only (a) reshapes
# the dev `api` service into a production posture and (b) adds the missing
# app tier: one-shot `migrate`, `worker`, and `web`.
#
# Boot order (enforced via depends_on, not the CLI service list):
#   postgres healthy -> migrate runs to completion -> api + worker start;
#   prestashop auto-installs in parallel; web is static and needs nothing.
#
# NOTE: `!reset` (used to drop the dev bind-mounts) requires Docker Compose
# >= 2.24 (Jan 2024).

services:
  api:
    environment:
      # Production posture for the demo image. The admin login stays the
      # predictable admin/admin because OL_BOOTSTRAP_ADMIN_PASSWORD is set
      # explicitly — under NODE_ENV=production BootstrapAdminService would
      # otherwise generate a random password (apps/api/src/auth/
      # bootstrap-admin.service.ts). Override in .env before exposing this
      # beyond localhost — admin/admin is a throwaway demo default, not a
      # production-safe credential.
      NODE_ENV: production
      OL_BOOTSTRAP_ADMIN_PASSWORD: '${OL_BOOTSTRAP_ADMIN_PASSWORD:-admin}'
      # CORS allow-list must include the browser origin the web UI is served
      # from (the `web` service publishes :8090), or login fails with a
      # "NetworkError when attempting to fetch resource" (#1368). The API
      # default is only http://localhost:4173 (apps/api/src/main.ts). Override
      # in .env with the real public origin (e.g. https://app.example.com)
      # when serving the UI from a domain other than localhost:8090.
      OL_CORS_ORIGIN: '${OL_CORS_ORIGIN:-http://localhost:8090}'
      # Required by migration 1795000000000-encrypt-integration-credentials and
      # for decrypting connection credentials at runtime. Operator-supplied via
      # .env (see .env.example); `:?` fails the boot with a clear message if unset.
      OPENLINKER_CREDENTIALS_ENCRYPTION_KEY: '${OPENLINKER_CREDENTIALS_ENCRYPTION_KEY:?set OPENLINKER_CREDENTIALS_ENCRYPTION_KEY in .env (see .env.example) - generate with: openssl rand -base64 32}'
    # Overrides base's port publish with the same ${OL_BIND_ADDRESS}/${API_HOST_PORT}
    # vars (#1400) — kept as an explicit override rather than relying on the
    # base value because the demo image ships default admin/admin credentials
    # with no redaction, so this binding must never silently drift from the
    # base file's. The browser reaches it at localhost:${API_HOST_PORT}
    # regardless (see the `web` service's VITE_API_BASE_URL below), so this is
    # transparent to the operator.
    # `!override` (not a plain list, which Compose would merge/append) replaces
    # base's binding outright — otherwise both publishes would coexist and
    # fail to bind the same host port twice.
    ports: !override
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${API_HOST_PORT:-3000}:3000'
    # Drop the dev-stack source bind-mounts — the demo runs the built image,
    # not the working tree. (Without !reset, Compose merges volumes by target
    # path and the mounts would survive the override.)
    volumes: !reset []
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-worker
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: openlinker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Required by shared PII config (libs/shared/src/config/pii-config.ts) —
      # order-ingestion jobs hash customer identifiers in the worker. Same
      # variable as the api service's (docker-compose.yml) — override once in
      # .env to keep both in sync.
      OL_PII_HASH_SALT: '${OL_PII_HASH_SALT:-development-pii-hash-salt-change-in-production}'
      # Same encryption key the api/migrate services use — the worker decrypts
      # connection credentials when running sync jobs (#1368).
      OPENLINKER_CREDENTIALS_ENCRYPTION_KEY: '${OPENLINKER_CREDENTIALS_ENCRYPTION_KEY:?set OPENLINKER_CREDENTIALS_ENCRYPTION_KEY in .env (see .env.example) - generate with: openssl rand -base64 32}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Build-time (Vite) — must be the API origin reachable from the
        # operator's BROWSER, hence localhost, not the compose service name.
        # Baked into the bundle at build time: overriding this in .env only
        # takes effect on the NEXT `--build` (e.g. https://api.example.com
        # for a public-domain deployment), not on a plain `up`/restart.
        VITE_API_BASE_URL: '${VITE_API_BASE_URL:-http://localhost:3000}'
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-web
    ports:
      # 8080 = PrestaShop, 8081 = phpMyAdmin, 8082 = WooCommerce
      # Loopback-bound by default (#1400): the demo ships default admin/admin
      # credentials with no redaction, so a multi-homed/LAN host must not
      # expose it beyond localhost.
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${WEB_HOST_PORT:-8090}:80'
    depends_on:
      - api

  # One-shot schema bootstrap. Runs the exact same migration command as local
  # development, from the `base` build stage (full source tree + dev deps).
  # Deliberately NOT the `production` stage: the compiled data-source.js
  # resolves its entity/migration globs against paths that assume the source
  # tree ships alongside dist (documented pre-existing characteristic in
  # apps/api/src/plugin-migrations.ts), so plugin-owned migrations (Allegro)
  # would be silently skipped there. `migration:run` is idempotent — re-runs
  # on an already-migrated volume are no-ops.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-migrate
    command: ['pnpm', '--filter', '@openlinker/api', 'migration:run']
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: openlinker
      # migration 1795000000000-encrypt-integration-credentials fails closed
      # under NODE_ENV=production when this is unset, rolling back and exiting 1
      # — which blocks the gated api/worker and aborts the whole demo (#1368).
      OPENLINKER_CREDENTIALS_ENCRYPTION_KEY: '${OPENLINKER_CREDENTIALS_ENCRYPTION_KEY:?set OPENLINKER_CREDENTIALS_ENCRYPTION_KEY in .env (see .env.example) - generate with: openssl rand -base64 32}'
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
