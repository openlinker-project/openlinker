name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    # `ready_for_review` so the heavy jobs (gated on `draft == false`) fire the
    # moment a draft is marked ready — without it a dev would need an empty push
    # to trigger full CI on un-drafting. Re-stating the default trio is required:
    # naming `types` replaces the implicit [opened, synchronize, reopened].
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel superseded runs on the same ref so a dead, replaced run doesn't keep
# holding scarce self-hosted slots and block the queue. Pushes to main rarely
# overlap; if a never-cancel-on-main policy is later wanted, gate with
# `cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}`.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap path gate. Runs on GitHub-hosted runners so it never consumes a
  # self-hosted slot. The four non-required heavy jobs (lint/test/integration/
  # build) gate on `code == 'true'`; `Type Check` (the only required check) is
  # intentionally NOT gated so it always reports — a docs-only or draft PR then
  # spends 1 self-hosted slot instead of 5.
  #
  # `code` matches any changed file EXCEPT pure docs / markdown / the dev-stack
  # compose file (none of which any CI job consumes — integration tests use
  # Testcontainers, not docker-compose.yml). Dockerfile is deliberately NOT
  # ignored: it feeds the future image build once CD is enabled.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!docker-compose.yml'

  lint:
    name: Lint
    timeout-minutes: 30
    # runs-on: ubuntu-latest
    runs-on: self-hosted
    needs: changes
    # Skip while draft, and skip when only docs/compose changed. Always run on
    # push (post-merge to main/develop) where there's no PR draft context.
    if: ${{ github.event_name == 'push' || (github.event.pull_request.draft == false && needs.changes.outputs.code == 'true') }}
    steps:
      - uses: actions/checkout@v4
      # actions/checkout@v4 shallow-fetches only the triggering ref, so
      # `refs/remotes/origin/main` is absent on pull_request builds. The
      # migration-ordering invariant (#1013) in check-migration-timestamps.mjs
      # derives its baseline from `git ls-tree origin/main`; without this fetch
      # it can't run on the one path that catches a mis-ordered migration
      # pre-merge (#1020). Forced refspec tolerates a stale ref on reused
      # self-hosted workspaces; main is never force-pushed.
      #
      # Guarded on `git` being present: some self-hosted runners have no git
      # binary (actions/checkout then uses its tarball/API fallback), where a
      # bare `git fetch` would exit 127 and fail the job. When git is absent the
      # guard skips gracefully (it can't run without git anyway — see #662/#557).
      - name: Fetch origin/main (baseline for migration-ordering invariant)
        run: |
          if command -v git >/dev/null 2>&1; then
            git fetch --no-tags --depth=1 origin +refs/heads/main:refs/remotes/origin/main
          else
            echo "git not available on this runner — migration-ordering guard will skip (#1020/#662)"
          fi
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build libs (workspace glob — auto-discovers new packages)
        run: pnpm -r --filter "./libs/**" build
      - name: Run lint
        run: pnpm lint

  type-check:
    name: Type Check
    timeout-minutes: 30
    # runs-on: ubuntu-latest
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test:
    name: Test
    timeout-minutes: 30
    # runs-on: ubuntu-latest
    runs-on: self-hosted
    needs: changes
    if: ${{ github.event_name == 'push' || (github.event.pull_request.draft == false && needs.changes.outputs.code == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # No explicit libs build: `pnpm test:ci` already runs
      # `pnpm -r --filter "./libs/**" build` before the tests, so a separate
      # step here builds libs twice in this one job.
      - name: Run tests
        run: pnpm test:ci

  test-integration:
    name: Integration Tests
    # Budget covers two sequential suites (API + worker) plus install + libs build.
    timeout-minutes: 45
    # runs-on: ubuntu-latest
    runs-on: self-hosted
    # `needs: changes` only for the cheap path-gate output — NOT an artifact
    # dependency on `test`. This job re-installs deps + rebuilds libs itself;
    # gating on `test` previously serialized the two longest jobs (unit ~6min,
    # then integration ~10min). Running them in parallel cuts the critical path
    # by ~6min. Trade-off: integration spends compute even when unit tests fail
    # on a PR — acceptable for the wall-clock win.
    needs: changes
    # Skip while draft / docs-only; always run on push (post-merge).
    if: ${{ github.event_name == 'push' || (github.event.pull_request.draft == false && needs.changes.outputs.code == 'true') }}
    # `actions: read` lets the orphan-sweep step below ask the Actions API
    # whether the run that created a given leftover container has actually
    # finished, instead of guessing from container age (#1285).
    permissions:
      contents: read
      actions: read
    env:
      OL_PII_HASH_SALT: ${{ vars.OL_PII_HASH_SALT }}
      # Ryuk (the Testcontainers reaper) requires a TCP callback from the
      # container back to the host. On self-hosted DinD runners this callback
      # fails because the Docker-in-Docker network is isolated, so Ryuk is
      # disabled here. NOTE (#1285): this runner is a persistent self-hosted
      # box (`runs-on: self-hosted`, not ephemeral `ubuntu-latest`) — its
      # Docker daemon does NOT stop/remove containers just because a job's
      # process exits, and a cancelled run (`cancel-in-progress`, see the
      # workflow-level `concurrency` block) is SIGKILLed before Jest's
      # globalTeardown can run either. With Ryuk off, nothing reaps those
      # containers on its own — the orphan-sweep step below is the
      # compensating control.
      TESTCONTAINERS_RYUK_DISABLED: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Sweep orphaned Testcontainers from finished CI runs (#1285)
        # Ryuk is disabled (see above) so containers from a cancelled or
        # crashed prior run are never reaped and pile up on this persistent
        # runner until the docker0 bridge's FDB table fills up (SSHS-7962).
        #
        # `libs/test-kit`'s `ciRunIdLabels()` stamps every Testcontainers
        # container this repo creates with its owning `GITHUB_RUN_ID`. For
        # each leftover container found here, this step asks the Actions API
        # for THAT run's actual current status rather than guessing from
        # container age — a run only ever reports `completed` once it is
        # truly over, so this can never remove a container belonging to
        # another `test-integration` job legitimately running concurrently
        # on this runner. (GitHub Actions API history confirmed 64 of 88
        # sampled `Integration Tests` job windows across different branches
        # overlap in time — this runner genuinely has more than one
        # concurrent job slot, ruling out an unconditional "remove
        # everything" sweep.) Containers without the label (predate this
        # fix, or a local/manual `docker compose` run) or whose owning run's
        # status can't be resolved (API hiccup, run outside retention) fall
        # back to a 90-minute age gate — double this job's timeout, so it
        # still can never match a live job's own containers.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          CUTOFF_EPOCH=$(( $(date -u +%s) - 5400 ))
          readarray -t CANDIDATES < <(docker ps -aq --filter "label=org.testcontainers=true")
          STALE=()
          for cid in "${CANDIDATES[@]}"; do
            [ -z "$cid" ] && continue
            OWNER_RUN_ID=$(docker inspect -f '{{ index .Config.Labels "ol.ci.run-id" }}' "$cid" 2>/dev/null || true)
            if [ -n "$OWNER_RUN_ID" ] && [ "$OWNER_RUN_ID" != "local" ] && [ "$OWNER_RUN_ID" != "$GITHUB_RUN_ID" ]; then
              RUN_STATUS=$(gh api "repos/$GH_REPOSITORY/actions/runs/$OWNER_RUN_ID" --jq '.status' 2>/dev/null || echo "")
              if [ "$RUN_STATUS" = "completed" ]; then
                STALE+=("$cid")
                continue
              elif [ -n "$RUN_STATUS" ]; then
                continue # queued/in_progress — still legitimately alive, leave it
              fi
              # RUN_STATUS empty: API lookup failed — fall through to the age check.
            fi
            if [ "$OWNER_RUN_ID" = "$GITHUB_RUN_ID" ]; then
              continue # this run's own container — never touch it here
            fi
            CREATED_EPOCH=$(date -u -d "$(docker inspect -f '{{.Created}}' "$cid")" +%s)
            if [ "$CREATED_EPOCH" -lt "$CUTOFF_EPOCH" ]; then
              STALE+=("$cid")
            fi
          done
          if [ "${#STALE[@]}" -gt 0 ]; then
            echo "Removing orphaned Testcontainers containers:"
            docker rm -f "${STALE[@]}"
          else
            echo "No orphaned Testcontainers containers found."
          fi
          # Network prune is safe unconditionally: Docker refuses to remove
          # a network that still has containers attached, regardless of age
          # or which run created it.
          docker network prune -f --filter "label=org.testcontainers=true" || true
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build libs (workspace glob — auto-discovers new packages)
        run: pnpm -r --filter "./libs/**" build
      - name: Verify core dist exists
        # Past-bug guard: a build-output regression in libs/core left
        # identifier-mapping unbuilt, breaking integration tests with cryptic
        # errors. Fail fast with a clear message instead.
        run: |
          test -f libs/core/dist/identifier-mapping/index.js \
            || (echo "ERROR: libs/core/dist/identifier-mapping/index.js missing after build" && exit 1)
      - name: Run integration tests
        run: pnpm --filter @openlinker/api test:integration
        timeout-minutes: 25 # PS container boot + module install + cache:warmup adds ~20-30s on Linux (#716)
        # Note: Docker is pre-installed on GitHub Actions runners, required for Testcontainers
      - name: Run worker integration tests
        # Runs even if the API suite failed (!cancelled) so a worker-specific
        # AppModule DI regression is reported independently — the point of #786.
        if: ${{ !cancelled() }}
        run: pnpm --filter @openlinker/worker test:integration
        timeout-minutes: 10 # Worker suite runs ~80s locally; cap guards a hung container boot
        # This job's own containers are cleaned up by apps/api's globalTeardown
        # (now wired, see jest-integration.cjs) and each suite's own afterAll
        # (e.g. the PrestaShop/WooCommerce container helpers). No post-job
        # sweep here: this run's own status is still `in_progress` until the
        # job finishes, so the pre-flight sweep's run-status check wouldn't
        # touch its containers anyway — the next run's pre-flight sweep picks
        # up anything this run itself failed to clean up.

  test-php:
    name: PHP Unit Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            apps/prestashop-module/openlinker/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/prestashop-module/openlinker/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run PHP unit tests
        run: pnpm test:php

  build:
    name: Build
    timeout-minutes: 30
#    runs-on: ubuntu-latest
    runs-on: self-hosted
    needs: changes
    if: ${{ github.event_name == 'push' || (github.event.pull_request.draft == false && needs.changes.outputs.code == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
