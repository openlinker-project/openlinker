name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build type definitions
        run: |
          # Build packages that provide types needed for type-aware linting
          # This ensures TypeScript can resolve types across workspace packages
          # and prevents 'any' type inference that triggers unsafe-* lint errors
          pnpm --filter @openlinker/shared build
          pnpm --filter @openlinker/core build
          pnpm --filter @openlinker/integrations-prestashop build
      - name: Run lint
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build dependencies
        run: |
          # Build shared and core packages first (required for PrestaShop integration tests)
          # This ensures TypeScript can resolve workspace subpath exports like @openlinker/core/orders
          pnpm --filter @openlinker/shared build
          pnpm --filter @openlinker/core build
      - name: Run tests
        run: pnpm test

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Run on push to main (after merge) and on PRs to catch issues early
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    needs: [test] # Only run if unit tests pass
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build dependencies
        run: |
          # Build shared, core, and PrestaShop integration (required for integration tests)
          # Integration tests boot the full NestJS app which imports PrestashopIntegrationModule
          pnpm --filter @openlinker/shared build
          pnpm --filter @openlinker/core build
          pnpm --filter @openlinker/integrations-prestashop build
      - name: Run integration tests
        run: pnpm --filter @openlinker/api test:integration
        timeout-minutes: 15 # Integration tests can take longer due to container startup
        # Note: Docker is pre-installed on GitHub Actions runners, required for Testcontainers

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
