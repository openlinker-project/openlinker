services:
  postgres:
    image: postgres:16-alpine
    container_name: openlinker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openlinker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: openlinker-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4.7
    container_name: openlinker-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prestashop
      MYSQL_USER: prestashop
      MYSQL_PASSWORD: prestashop
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot']
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    platform: linux/amd64
    container_name: openlinker-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '8081:80'
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'php -r "exit(@file_get_contents(\"http://localhost:80\") ? 0 : 1);"']
      interval: 10s
      timeout: 5s
      retries: 5

  prestashop:
    image: prestashop/prestashop:9.0.2-2.0-classic-8.4
    container_name: openlinker-prestashop
    environment:
      PS_DOMAIN: localhost:8080
      PS_FOLDER_ADMIN: admin
      PS_COUNTRY: US
      PS_LANGUAGE: en
      PS_DB_SERVER: mysql
      PS_DB_NAME: prestashop
      PS_DB_USER: prestashop
      PS_DB_PASSWD: prestashop
      PS_DB_PREFIX: ps_
      PS_ENABLE_SSL: 0
      PS_DEMO_MODE: 0
      PS_DEV_MODE: 0
      PS_INSTALL_AUTO: 1
      DB_SERVER: mysql
      DB_NAME: prestashop
      DB_USER: prestashop
      DB_PASSWD: prestashop
      DB_PREFIX: ps_
      ADMIN_MAIL: demo@prestashop.com
      ADMIN_PASSWD: prestashop_demo
    ports:
      - '8080:80'
    volumes:
      - prestashop_data:/var/www/html
      # Bind-mount module source for fast dev iteration
      - ./apps/prestashop-module/openlinkerwebhooks:/var/www/html/modules/openlinkerwebhooks
      # Post-install script: rename randomized admin folder to /admin-dev
      - ./docker/prestashop/post-install:/tmp/post-install-scripts:ro
    extra_hosts:
      # Enable host.docker.internal on Linux (macOS/Windows work out of the box)
      # Allows PrestaShop container to reach OpenLinker API running on host
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'php -r "exit(@file_get_contents(\"http://localhost:80\") ? 0 : 1);"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: openlinker-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: openlinker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: development-secret-key-change-in-production
      JWT_EXPIRES_IN: 1d
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./libs:/app/libs

volumes:
  postgres_data:
  redis_data:
  mysql_data:
  prestashop_data:

