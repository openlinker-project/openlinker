# Port binding / naming conventions (#1400):
#
# - Every published port binds to ${OL_BIND_ADDRESS:-127.0.0.1} by default —
#   loopback-only, so a shared/public host doesn't expose postgres/redis/mysql/
#   phpMyAdmin/PrestaShop/api to the internet just because a firewall wasn't
#   configured. Override OL_BIND_ADDRESS in .env only when a service genuinely
#   needs to be reachable beyond loopback (e.g. behind a reverse proxy on its
#   own host).
# - Every host-side port is a `${<SERVICE>_HOST_PORT:-<default>}` override —
#   named with a `_HOST_PORT` suffix (not e.g. plain `REDIS_PORT`) so it can't
#   be confused with the *container-internal* env vars of the same service
#   family (api's `REDIS_PORT: 6379` below is the internal Redis port the api
#   process connects to — always 6379 — and is unrelated to the host-side
#   publish this section controls).
# - `${COMPOSE_PROJECT_NAME:-openlinker}` drives both the top-level project
#   name and every `container_name`, so a second stack instance (different
#   `.env`: distinct COMPOSE_PROJECT_NAME + shifted *_HOST_PORT values) can
#   run alongside this one on the same host without name or port collisions.
#   Defaults reproduce today's exact literal names/ports — nothing changes
#   for an operator who doesn't set .env overrides, beyond the loopback bind.
#
# Volume rule: named Docker volumes (declared at the bottom of this file) are
# for persistent service data. Bind-mounts into the repo tree are used only
# where a container needs live repo files it doesn't own as data — PrestaShop
# module source for fast dev iteration, and one-shot PrestaShop/WooCommerce
# post-install/init scripts.
name: ${COMPOSE_PROJECT_NAME:-openlinker}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-postgres
    environment:
      POSTGRES_USER: postgres
      # Override in .env for anything beyond local dev/demo use (#1403) — the
      # default is a throwaway value, not a secret. Every service below that
      # connects to Postgres references this same var so they never drift.
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-postgres}'
      POSTGRES_DB: openlinker
    ports:
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-redis
    ports:
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4.7
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-mysql
    environment:
      # Overridable in .env (#1403) — both default to today's literal values.
      # PRESTASHOP_MYSQL_PASSWORD must match the prestashop service's
      # PS_DB_PASSWD/DB_PASSWD below (same var referenced at both sites).
      MYSQL_ROOT_PASSWORD: '${PRESTASHOP_MYSQL_ROOT_PASSWORD:-root}'
      MYSQL_DATABASE: prestashop
      MYSQL_USER: prestashop
      MYSQL_PASSWORD: '${PRESTASHOP_MYSQL_PASSWORD:-prestashop}'
    ports:
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${MYSQL_HOST_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${PRESTASHOP_MYSQL_ROOT_PASSWORD:-root}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      # First-boot init (~60s: creates the prestashop db/user) must not be
      # counted against the retry window, or a slower host marks MySQL
      # unhealthy and aborts the dependent prestashop/phpmyadmin services (#1368).
      start_period: 180s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    platform: linux/amd64
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      # Mirrors the mysql service's root password (#1403) — phpMyAdmin only
      # ever talks to the PrestaShop-side MySQL instance.
      PMA_PASSWORD: '${PRESTASHOP_MYSQL_ROOT_PASSWORD:-root}'
      MYSQL_ROOT_PASSWORD: '${PRESTASHOP_MYSQL_ROOT_PASSWORD:-root}'
    ports:
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${PHPMYADMIN_HOST_PORT:-8081}:80'
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'php -r "exit(@file_get_contents(\"http://localhost:80\") ? 0 : 1);"']
      interval: 10s
      timeout: 5s
      retries: 5

  woocommerce-mysql:
    image: mysql:8.4.7
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-woocommerce-mysql
    environment:
      # Overridable in .env (#1403), separate from the PrestaShop MySQL
      # instance's vars — these two databases rotate independently.
      # WOOCOMMERCE_MYSQL_PASSWORD must match the woocommerce service's
      # WORDPRESS_DATABASE_PASSWORD below (same var referenced at both sites).
      MYSQL_ROOT_PASSWORD: '${WOOCOMMERCE_MYSQL_ROOT_PASSWORD:-root}'
      MYSQL_DATABASE: woocommerce
      MYSQL_USER: woocommerce
      MYSQL_PASSWORD: '${WOOCOMMERCE_MYSQL_PASSWORD:-woocommerce}'
    ports:
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${WOOCOMMERCE_MYSQL_HOST_PORT:-3307}:3306'
    volumes:
      - woocommerce_mysql_data:/var/lib/mysql
    healthcheck:
      # -p<password>: no space between flag and password.
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u',
          'root',
          '-p${WOOCOMMERCE_MYSQL_ROOT_PASSWORD:-root}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  woocommerce:
    image: bitnamilegacy/wordpress:6.7.1
    platform: linux/amd64
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-woocommerce
    depends_on:
      woocommerce-mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DATABASE_HOST: woocommerce-mysql
      WORDPRESS_DATABASE_PORT_NUMBER: 3306
      WORDPRESS_DATABASE_NAME: woocommerce
      WORDPRESS_DATABASE_USER: woocommerce
      # Must match woocommerce-mysql's MYSQL_PASSWORD above (#1403).
      WORDPRESS_DATABASE_PASSWORD: '${WOOCOMMERCE_MYSQL_PASSWORD:-woocommerce}'
      WORDPRESS_USERNAME: admin
      WORDPRESS_PASSWORD: admin123
      WORDPRESS_EMAIL: admin@openlinker.local
      WORDPRESS_SITE_TITLE: OpenLinker WC Dev
      # Pinned by URL: latest WooCommerce (>=10.8) requires WP 6.9, but the
      # bitnamilegacy image is frozen at 6.7.1 — an unpinned 'woocommerce' slug
      # breaks every fresh install. WC 10.1.0 requires WP >= 6.7.
      WORDPRESS_PLUGINS: https://downloads.wordpress.org/plugin/woocommerce.10.1.0.zip
    ports:
      # 8082: avoids collision with PrestaShop on 8080
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${WOOCOMMERCE_HOST_PORT:-8082}:8080'
    volumes:
      - woocommerce_data:/bitnami/wordpress
      - ./docker/woocommerce:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # /wp-json/wc/v3/ = WC namespace index, returns 200 without auth once WC is active.
      # NOT /wp-json/wc/v3/system_status (requires consumer key — chicken-and-egg at startup).
      # php, not curl/wget — neither exists in the bitnamilegacy image.
      # Needle is "wc\/v3", not "wc/v3": the response body is a JSON string
      # produced by PHP's json_encode, which escapes "/" as "\/" by default —
      # the unescaped needle never matches, so the healthcheck always failed
      # (container ran fine but was permanently reported unhealthy).
      test: ['CMD-SHELL', 'php -r ''exit(strpos((string) @file_get_contents("http://localhost:8080/wp-json/wc/v3/"), "wc\/v3") === false ? 1 : 0);''']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  prestashop:
    image: prestashop/prestashop:9.0.2-2.0-classic-8.4
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-prestashop
    # Auto-install + post-install scripts run via the upstream image's
    # /tmp/docker_run.sh (the default CMD). It iterates /tmp/post-install-scripts/
    # alphabetically after the installer completes. Use `pnpm dev:stack:seed-prestashop`
    # to re-run them mid-development without recreating the volume.
    environment:
      # Canonical shop domain PrestaShop bakes into generated links/redirects.
      # Override in .env for a public-domain deployment (e.g. shop.example.com).
      PS_DOMAIN: '${PS_DOMAIN:-localhost:8080}'
      PS_FOLDER_ADMIN: admin
      PS_COUNTRY: US
      PS_LANGUAGE: en
      PS_DB_SERVER: mysql
      PS_DB_NAME: prestashop
      PS_DB_USER: prestashop
      # Must match the mysql service's MYSQL_PASSWORD (#1403).
      PS_DB_PASSWD: '${PRESTASHOP_MYSQL_PASSWORD:-prestashop}'
      PS_DB_PREFIX: ps_
      PS_ENABLE_SSL: 0
      PS_DEMO_MODE: 0
      PS_DEV_MODE: 0
      PS_INSTALL_AUTO: 1
      DB_SERVER: mysql
      DB_NAME: prestashop
      DB_USER: prestashop
      DB_PASSWD: '${PRESTASHOP_MYSQL_PASSWORD:-prestashop}'
      DB_PREFIX: ps_
      ADMIN_MAIL: demo@prestashop.com
      # The seeded PrestaShop admin login password (#1403) — override before
      # exposing this beyond localhost, same as OL_BOOTSTRAP_ADMIN_PASSWORD.
      ADMIN_PASSWD: '${ADMIN_PASSWD:-prestashop_demo}'
    ports:
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${PRESTASHOP_HOST_PORT:-8080}:80'
    volumes:
      - prestashop_data:/var/www/html
      # Bind-mount module source for fast dev iteration
      - ./apps/prestashop-module/openlinker:/var/www/html/modules/openlinker
      # Post-install scripts: rename randomized admin folder, seed currency + products
      - ./docker/prestashop/post-install:/tmp/post-install-scripts:ro
      # PHP companions invoked by post-install/*.sh — kept outside the
      # /tmp/post-install-scripts/ directory because the upstream image's
      # docker_run.sh execs every entry in that directory directly, and the
      # .php files lack a shebang + +x mode.
      - ./docker/prestashop/post-install-lib:/tmp/post-install-lib:ro
    extra_hosts:
      # Enable host.docker.internal on Linux (macOS/Windows work out of the box)
      # Allows PrestaShop container to reach OpenLinker API running on host
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      # PS_DOMAIN redirects "/" to http://localhost:8080/ (the host-mapped port),
      # which isn't reachable from inside this container. `curl` without `-L`
      # accepts the 302 as proof Apache is up; PHP's file_get_contents() follows
      # redirects by default and fails with "Connection refused" on :8080 (#1392).
      test: ['CMD', 'curl', '-fsS', '-o', '/dev/null', 'http://localhost:80']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ${COMPOSE_PROJECT_NAME:-openlinker}-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      # Must match the postgres service's POSTGRES_PASSWORD above (#1403).
      DB_PASSWORD: '${POSTGRES_PASSWORD:-postgres}'
      DB_DATABASE: openlinker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Override every one of these in .env for anything beyond local
      # dev/demo use — the defaults are throwaway values, not secrets.
      JWT_SECRET: '${JWT_SECRET:-development-secret-key-change-in-production}'
      JWT_EXPIRES_IN: '${JWT_EXPIRES_IN:-1d}'
      OL_PII_HASH_SALT: '${OL_PII_HASH_SALT:-development-pii-hash-salt-change-in-production}'
      # Base URL used to build confirm-email/reset-password links emailed to
      # users (EmailConfirmationService, MailerPasswordResetNotifierAdapter).
      # Defaults to the demo web service's own published port (WEB_HOST_PORT,
      # docker-compose.demo.yml) rather than a second, unrelated hardcoded
      # default — so the two stay in sync automatically instead of drifting
      # like the Vite-preview-port default (4173) that neither compose file
      # ever overrode (#1647).
      WEB_URL: '${WEB_URL:-http://localhost:${WEB_HOST_PORT:-8090}}'
    ports:
      - '${OL_BIND_ADDRESS:-127.0.0.1}:${API_HOST_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./libs:/app/libs

volumes:
  postgres_data:
  redis_data:
  mysql_data:
  prestashop_data:
  woocommerce_mysql_data:
  woocommerce_data:

